name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify page count
        run: |
          PAGE_COUNT=$(find out -name '*.html' | wc -l | tr -d ' ')
          echo "Generated $PAGE_COUNT pages"
          if [ "$PAGE_COUNT" -lt 100 ]; then
            echo "::error::Expected at least 100 pages, got $PAGE_COUNT"
            exit 1
          fi
